# Changesets on dev (Version Packages PRs) + npm publish on main (Trusted Publishing / OIDC).
# Publish on main runs only when package.json version is not yet on npm.
# @see https://docs.npmjs.com/trusted-publishers
# @see docs/GITHUB_SETUP.md
name: Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: publish-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  version:
    name: Version packages (dev)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'dev')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Changesets (version PR)
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-check:
    name: Check unpublished version (main)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    outputs:
      needs_publish: ${{ steps.check.outputs.needs_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Check registry
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "needs_publish=false" >> "$GITHUB_OUTPUT"
            echo "${NAME}@${VERSION} is already on npm — nothing to publish for this merge." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "needs_publish=true" >> "$GITHUB_OUTPUT"
            echo "${NAME}@${VERSION} is not on npm — publish will run." >> "$GITHUB_STEP_SUMMARY"
          fi

  publish:
    name: Publish to npm (main)
    runs-on: ubuntu-latest
    needs: release-check
    if: >
      needs.release-check.outputs.needs_publish == 'true' &&
      ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
       (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'))

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm publish --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "### Published to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "Published with npm Trusted Publishing (OIDC)." >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.changesets.outputs.publishedPackages }}' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
