# Changesets: "Version Packages" PRs + npm publish via Trusted Publishing (OIDC).
# @see https://docs.npmjs.com/trusted-publishers
# @see docs/GITHUB_SETUP.md
name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # OIDC for npm Trusted Publishing
  contents: write
  pull-requests: write

jobs:
  publish:
    name: Version & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pending .changeset/*.md → open "Version Packages" PR (no publish).
      # No pending changesets (usually right after merging that PR) → npm publish (OIDC).
      - name: Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: npm publish --access public
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "### Published to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "Published with \`npm publish\` (Trusted Publishing / OIDC)." >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.changesets.outputs.publishedPackages }}' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
